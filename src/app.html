<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#6c5ce7" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Time Tracker" />
    <style>
      /* Shown by default; hidden only once we confirm a Baseline-2024 browser.
         Browsers too old for light-dark() — or even for @supports — keep it
         visible, so they get a message instead of the SPA's blank page. */
      #legacy-browser {
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
        text-align: center;
        background: #fde8e8;
        color: #1a1a1a;
      }
      @supports (color: light-dark(#000, #fff)) {
        #legacy-browser {
          display: none;
        }
      }
    </style>
    <script>
      // Apply the saved colour theme before first paint, so every page — the
      // client-rendered app and the server-rendered auth screens alike — shows a
      // consistent palette with no flash. 'auto'/unset leaves color-scheme
      // following the OS. The store keeps this key in sync (see routes/+page.svelte).
      try {
        var t = localStorage.getItem('swish.theme');
        if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
      } catch (e) {
        /* storage blocked: fall back to the OS preference */
      }
    </script>
    %sveltekit.head%
  </head>
  <body>
    <p id="legacy-browser">
      This app needs an up-to-date browser — please update to the latest Chrome, Edge, Firefox, or
      Safari.
    </p>
    <noscript>This app requires JavaScript.</noscript>
    <div id="app">%sveltekit.body%</div>
  </body>
</html>
