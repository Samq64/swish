<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Time Tracker</title>
    <!-- Self-contained on purpose: this page is served by the service worker
         when the network is unreachable, so it can't depend on any other asset. -->
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        /* Include the padding in the 100dvh so the page fits exactly — without
           border-box, padding adds on top and forces a needless scrollbar. */
        box-sizing: border-box;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px;
        text-align: center;
        font-family: system-ui, sans-serif;
        background: light-dark(#f7f7fa, #16161c);
        color: light-dark(#2d2d3a, #e7e7ef);
      }
      h1 {
        margin: 0;
        font-size: 20px;
      }
      p {
        margin: 0;
        max-width: 34ch;
        line-height: 1.5;
        color: light-dark(#8a8a9a, #9595a4);
      }
      button {
        margin-top: 8px;
        border: none;
        border-radius: 8px;
        padding: 10px 20px;
        font: inherit;
        font-weight: 600;
        color: #fff;
        background: #6c5ce7;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>You're offline</h1>
    <p>Time Tracker needs an internet connection to load. Reconnect and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </body>
</html>
