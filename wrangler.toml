# Cloudflare Pages configuration for swish.
#
# The static SPA is built to dist/; Pages Functions in functions/ are deployed
# automatically and serve the API at /api/*. Local dev uses a local SQLite
# simulation of D1 (no database_id needed); set database_id below after running
#   npx wrangler d1 create swish
# for remote deploys.
name = "swish"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "swish"
database_id = "608822e2-3016-486b-9ec4-ab00829a939d"
