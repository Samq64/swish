# Cloudflare Pages configuration for swish.
#
# SvelteKit (adapter-cloudflare) builds a Pages deployment to
# .svelte-kit/cloudflare; `vite dev` reads the bindings below via platformProxy.
# Local dev uses a local SQLite simulation of D1 (no database_id needed); set
# database_id below for remote deploys (npx wrangler d1 create swish).
name = "swish"
compatibility_date = "2024-09-23"
pages_build_output_dir = ".svelte-kit/cloudflare"

[[d1_databases]]
binding = "DB"
database_name = "swish"
database_id = "608822e2-3016-486b-9ec4-ab00829a939d"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "swish-preview"
database_id = "06e1b796-5a55-42d9-9aac-7b7b45010dca"
